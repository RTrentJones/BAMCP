name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: make install
      - run: make lint
      - run: make typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: make install
      - name: Install telemetry + eval extras
        # The 85% strict coverage gate needs the OTel SDK (telemetry tests)
        # and the eval extras (pyyaml, anthropic, openai construction).
        run: pip install -e ".[telemetry,eval]"
      - run: make test
      - name: Strict coverage on new code paths
        if: matrix.python-version == '3.12'
        run: make coverage-strict
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage

  e2e:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make install
      - run: playwright install --with-deps chromium
      - run: python -m pytest tests/e2e/ -v --no-cov
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose --profile prod build
      - run: docker compose --profile dev build
