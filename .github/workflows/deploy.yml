# ============================================================================
# Deploy BAMCP to OCI Container Instance
#
# Builds the ARM64 Docker image, pushes it to GitHub Container Registry
# (ghcr.io), then restarts the OCI Container Instance so it pulls the new
# `:latest` tag.
#
# Why GHCR instead of OCIR:
#   OCI blocks the Container Registry service on Always Free tenancies as of
#   mid-2026 — the console can't even list repositories, and push/create
#   APIs return "Free tier account is not supported." GHCR is unaffected,
#   free, and OCI Container Instances can pull from any Docker registry.
#
# Triggers:
#   - Push tag matching v* (e.g., v0.2.0)
#   - Manual workflow_dispatch
#
# Required GitHub Secrets:
#   OCI_CLI_USER                — OCI user OCID
#   OCI_CLI_TENANCY             — OCI tenancy OCID
#   OCI_CLI_FINGERPRINT         — API key fingerprint
#   OCI_CLI_KEY_CONTENT         — API signing key (PEM content)
#   OCI_CLI_REGION              — e.g., us-ashburn-1
#   OCI_CONTAINER_INSTANCE_OCID — the container instance to restart
#
# No GitHub PAT needed: the workflow uses the built-in GITHUB_TOKEN to push
# to GHCR under the repository owner's namespace.
#
# One-time setup on the OCI side:
#   1. OCI Console → Container Instances → <your instance> → Configuration
#   2. Set image URL to: ghcr.io/<owner>/bamcp:latest
#      (lowercase owner; e.g. ghcr.io/rtrentjones/bamcp:latest)
#   3. If the GHCR package is private, attach a registry credential with a
#      GitHub PAT that has `read:packages`. If you set the package to public
#      (GitHub → repo → Packages → Settings → Change visibility), no
#      credential is needed.
# ============================================================================

name: Deploy to OCI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve GHCR image path
        id: img
        # GHCR is case-sensitive and requires lowercase. Tag with :latest
        # plus the git ref (e.g. v0.2.0) for rollback / reproducibility.
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/bamcp" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restart Container Instance
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: >-
            container-instances container-instance restart
            --container-instance-id ${{ secrets.OCI_CONTAINER_INSTANCE_OCID }}
