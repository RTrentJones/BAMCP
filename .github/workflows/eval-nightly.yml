name: Eval (nightly)

# The deterministic ground-truth gate runs on every PR (ci.yml::eval-smoke).
# This workflow adds the parts that are too slow or too costly for a PR gate:
# a nightly re-run of the gate, plus an optional LLM-driven eval that only runs
# when an API key is configured. Results are uploaded as artifacts so the
# numbers can be tracked over time.

on:
  schedule:
    - cron: "0 7 * * *" # daily, after the security weekly window
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider for the optional model run"
        default: "anthropic"
        type: choice
        options: [anthropic, openai, mock]

permissions:
  contents: read

jobs:
  ground-truth:
    # Deterministic, no secrets — always runs and always gates.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: make install
      - run: pip install -e ".[eval]"
      - run: python tests/create_fixtures.py
      - name: Score ground-truth truth set (JSON)
        run: |
          python -m bamcp.eval.truthset --json | tee truthset-report.json
      - uses: actions/upload-artifact@v6
        with:
          name: truthset-report
          path: truthset-report.json

  llm-eval:
    # Optional: only runs when ANTHROPIC_API_KEY is present in repo secrets, so
    # forks and key-less setups skip it cleanly instead of failing.
    runs-on: ubuntu-latest
    needs: [ground-truth]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Check for API key
        id: key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No ANTHROPIC_API_KEY configured — skipping LLM eval."
          fi
      - if: steps.key.outputs.available == 'true'
        run: make install && pip install -e ".[eval]"
      - if: steps.key.outputs.available == 'true'
        run: python tests/create_fixtures.py
      - name: Run LLM eval harness
        if: steps.key.outputs.available == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/run_eval.py \
            --provider "${{ github.event.inputs.provider || 'anthropic' }}" \
            --output-dir .eval-results
      - uses: actions/upload-artifact@v6
        if: steps.key.outputs.available == 'true'
        with:
          name: eval-results
          path: .eval-results/
