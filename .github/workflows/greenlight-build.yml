name: greenlight-build

# Provider-agnostic: build the container -> push to GHCR -> notify the wrapper to deploy.
# The wrapper owns the OCI infra + creds; this repo only needs GREENLIGHT_DISPATCH_TOKEN
# (a fine-grained PAT with "Contents: write" on RTrentJones/RTrentJones.dev) to fire the dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Native arm64 runner — builds the arm64 image directly (no QEMU emulation, much faster).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image ref (GHCR namespaces are lowercase)
        id: img
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/bamcp" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          # :prod is the moving deploy tag; :<sha> is immutable (rollback + deploy-identity).
          tags: |
            ${{ steps.img.outputs.base }}:prod
            ${{ steps.img.outputs.base }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Notify wrapper to deploy
        env:
          GH_TOKEN: ${{ secrets.GREENLIGHT_DISPATCH_TOKEN }}
        if: ${{ env.GH_TOKEN != '' }}
        run: |
          gh api repos/RTrentJones/RTrentJones.dev/dispatches \
            -f event_type=deploy-bamcp \
            -F client_payload[sha]=${{ github.sha }}
