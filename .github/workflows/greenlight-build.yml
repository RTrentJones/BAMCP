name: greenlight-build

# Provider-agnostic: TEST -> build the container -> push to GHCR -> notify the wrapper to deploy.
# The ship is GATED on BAMCP's own tests (build `needs: [test]`) — a broken change never produces an
# image or reaches prod (oci is direct-to-prod, so this is the pre-deploy safety net). The wrapper
# owns the OCI infra + creds; this repo only needs GREENLIGHT_DISPATCH_TOKEN (a fine-grained PAT with
# "Contents: write" on RTrentJones/RTrentJones.dev) to fire the dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Ship-gate: pytest + the deterministic eval-smoke (no network/key) must pass before we build.
    # Mirrors ci.yml's setup — the telemetry tests need the OTel SDK ([telemetry]) and eval-smoke
    # needs the eval extra + generated truthset fixtures, or `make test`/`make eval-smoke` fail.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: make install
      - run: pip install -e ".[telemetry,eval]"
      - run: make test
      - run: python tests/create_fixtures.py
      - run: make eval-smoke

  build:
    needs: [test]
    # Native arm64 runner — builds the arm64 image directly (no QEMU emulation, much faster).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - name: Resolve image ref (GHCR namespaces are lowercase)
        id: img
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/bamcp" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          # :prod is the moving deploy tag; :<sha> is immutable (rollback + deploy-identity).
          tags: |
            ${{ steps.img.outputs.base }}:prod
            ${{ steps.img.outputs.base }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Notify wrapper to deploy
        env:
          GH_TOKEN: ${{ secrets.GREENLIGHT_DISPATCH_TOKEN }}
        if: ${{ env.GH_TOKEN != '' }}
        run: |
          gh api repos/RTrentJones/RTrentJones.dev/dispatches \
            -f event_type=deploy-bamcp \
            -F client_payload[sha]=${{ github.sha }}
