name: Security

# Dependency-CVE auditing + static analysis. Complements the `ruff` security
# lints (the `S` ruleset) already enforced in ci.yml: ruff catches insecure
# *code patterns*; this catches *vulnerable dependencies* and deeper data-flow
# issues that linting can't see.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly-disclosed CVEs in pinned deps surface even with no commits.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: make install
      - name: Audit installed dependencies for known CVEs
        # Audits the resolved environment (incl. transitive deps). To accept a
        # specific advisory with no available fix, add `--ignore-vuln <GHSA-id>`
        # here with a comment justifying it — keep the list short and reviewed.
        run: |
          pip install pip-audit
          pip-audit --strict --desc

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
